<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HROne — InboxforHR</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#111;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Public Sans',sans-serif}
#vp{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
#stage{position:relative;width:1920px;height:1080px;background:#06261a;flex-shrink:0;transform-origin:center;overflow:hidden}
.a{position:absolute}

/* nav */
.nav{position:fixed;bottom:26px;right:30px;display:flex;align-items:center;gap:12px;z-index:200;background:rgba(6,38,26,.84);backdrop-filter:blur(6px);padding:8px 14px 8px 16px;border-radius:40px}
.nav-cnt{color:rgba(255,255,255,.6);font-size:14px;font-weight:500;letter-spacing:.5px;margin-right:4px}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.28);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s,transform .12s}
.nav-btn:hover{background:rgba(35,165,120,.5)}
.nav-btn:active{transform:scale(.92)}
.nav-btn svg{width:20px;height:20px}

@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fd{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="vp"><div id="stage">

<!-- ══ DECORATIVE GLOW ELLIPSES ══ -->
<div class="a" style="right:-143px;top:-310px;width:729px;height:729px;background:radial-gradient(ellipse at center,rgba(50,213,131,0.18) 0%,transparent 65%);pointer-events:none"></div>
<div class="a" style="left:-385px;top:-284px;width:978px;height:978px;background:radial-gradient(ellipse at center,rgba(50,213,131,0.14) 0%,transparent 60%);pointer-events:none"></div>
<div class="a" style="left:461px;bottom:-327px;width:978px;height:978px;background:radial-gradient(ellipse at center,rgba(50,213,131,0.10) 0%,transparent 60%);pointer-events:none"></div>
<!-- top-right glow (unique to this slide) -->
<div class="a" style="left:1541px;top:-28px;width:832px;height:832px;background:radial-gradient(ellipse at center,rgba(50,213,131,0.16) 0%,transparent 60%);pointer-events:none"></div>

<!-- ══ HRONE WHITE LOGO ══ -->
<img class="a" src="Assets/hrone white logo.svg" style="left:1602px;top:73px;width:225px;height:51px;object-fit:contain;object-position:left center;animation:fi .4s .1s ease both">

<!-- ══ EYEBROW ══ -->
<div class="a" style="left:72px;top:93px;width:38px;height:3px;background:#ee5a3c;border-radius:2px;animation:fi .4s .1s ease both"></div>
<p class="a" style="left:125px;top:80px;font-size:22px;font-weight:500;color:#e7efec;line-height:1;animation:fi .4s .1s ease both">Why HROne?</p>

<!-- ══ LEFT HEADLINE ══ -->
<!-- "WE BUILT" -->
<p class="a" style="left:72px;top:290px;font-size:30px;font-weight:700;color:#b2d3c9;letter-spacing:5.2px;line-height:24px;animation:fd .5s .2s ease both">WE BUILT</p>

<!-- "The world's first" -->
<div class="a" style="left:72px;top:341px;font-size:80px;font-weight:800;color:#fff;line-height:64px;letter-spacing:-1.1px;animation:fd .5s .25s ease both">The world's first</div>

<!-- "InboxforHR™" — green with TM superscript -->
<div class="a" style="left:72px;top:428px;line-height:64px;animation:fd .5s .3s ease both">
  <span style="font-size:80px;font-weight:800;color:#32d583;letter-spacing:-1.1px">InboxforHR</span><sup style="font-size:32px;font-weight:800;color:#32d583;vertical-align:super;line-height:0;letter-spacing:-0.5px">TM</sup>
</div>

<!-- section divider line (green) -->
<div class="a" style="left:75px;top:548px;width:250px;height:3px;background:#32d583;border-radius:1px;animation:fi .4s .35s ease both"></div>

<!-- subtitle -->
<p class="a" style="left:72px;top:607px;width:506px;font-size:28px;font-weight:500;color:#b2d3c9;line-height:34px;animation:fd .5s .4s ease both">
  Zero learning curve - if your team can read an email, they can run HR.
</p>

<!-- ══ STATS ROW ══ -->
<!-- 01 -->
<p class="a" style="left:72px;top:735px;font-size:22px;font-weight:900;color:#009f78;line-height:28px;letter-spacing:-0.4px;animation:fu .4s .5s ease both">01</p>
<p class="a" style="left:109px;top:739px;width:150px;font-size:14px;font-weight:900;color:rgba(255,255,255,0.5);line-height:19px;letter-spacing:1.4px;animation:fu .4s .5s ease both">ONE QUEUE</p>
<!-- 02 -->
<p class="a" style="left:263px;top:735px;font-size:22px;font-weight:900;color:#009f78;line-height:28px;letter-spacing:-0.4px;animation:fu .4s .55s ease both">02</p>
<p class="a" style="left:305px;top:739px;width:150px;font-size:14px;font-weight:900;color:rgba(255,255,255,0.5);line-height:19px;letter-spacing:1.4px;animation:fu .4s .55s ease both">NO TRAINING</p>
<!-- 03 -->
<p class="a" style="left:468px;top:735px;font-size:22px;font-weight:900;color:#009f78;line-height:28px;letter-spacing:-0.4px;animation:fu .4s .6s ease both">03</p>
<p class="a" style="left:506px;top:739px;width:150px;font-size:14px;font-weight:900;color:rgba(255,255,255,0.5);line-height:19px;letter-spacing:1.4px;animation:fu .4s .6s ease both">FASTER ACTION</p>

<!-- ══ PRODUCT MOCKUP CARD ══ -->
<img class="a" src="Assets/inboxforhr.png"
     style="left:747px;top:270px;width:1210px;height:812px;
            object-fit:cover;object-position:left top;
            border-radius:17px 17px 17px 0;
            box-shadow:0 0 0 1px rgba(0,0,0,0.07), 0 27px 54px -13px rgba(2,86,61,0.18);
            display:block;transform:translateZ(0);
            image-rendering:-webkit-optimize-contrast;
            animation:fi .6s .2s ease both">

<!-- ══ NAV ══ -->
<div class="nav">
  <span class="nav-cnt">7 / 34</span>
  <button class="nav-btn" id="prevBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn" id="nextBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

</div></div>
<script>
function fit(){var s=Math.min(innerWidth/1920,innerHeight/1080);document.getElementById('stage').style.transform='scale('+s+')';}
fit();addEventListener('resize',fit);
document.getElementById('prevBtn').onclick=function(){if(parent!==window)parent.postMessage({type:'nav-key',key:'ArrowLeft'},'*');};
document.getElementById('nextBtn').onclick=function(){if(parent!==window)parent.postMessage({type:'nav-key',key:'ArrowRight'},'*');};
</script>
</body>
</html>
