<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HROne — Expense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#013a29;overflow:hidden;display:flex;align-items:center;justify-content:center}
#vp{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
#stage{position:relative;width:1920px;height:1080px;flex-shrink:0;transform-origin:center;overflow:hidden}
.nav{position:fixed;bottom:26px;right:30px;display:flex;align-items:center;gap:12px;z-index:200;background:rgba(1,58,41,.84);backdrop-filter:blur(6px);padding:8px 14px 8px 16px;border-radius:40px}
.nav-cnt{color:rgba(255,255,255,.6);font-size:14px;font-weight:500;letter-spacing:.5px;margin-right:4px}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.28);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s,transform .12s}
.nav-btn:hover{background:rgba(35,165,120,.5)}
.nav-btn:active{transform:scale(.92)}
.nav-btn svg{width:20px;height:20px}
</style>
</head>
<body>
<div id="vp"><div id="stage">
<img src="Assets/modules_slide/06_Expense.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
<div class="nav">
  <span class="nav-cnt">28 / 30</span>
  <button class="nav-btn" id="prevBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
  <button class="nav-btn" id="nextBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
</div>
</div></div>
<script>
function fit(){var s=Math.min(innerWidth/1920,innerHeight/1080);document.getElementById('stage').style.transform='scale('+s+')';}
fit();addEventListener('resize',fit);
document.getElementById('prevBtn').onclick=function(){if(parent!==window)parent.postMessage({type:'nav-key',key:'ArrowLeft'},'*');};
document.getElementById('nextBtn').onclick=function(){if(parent!==window)parent.postMessage({type:'nav-key',key:'ArrowRight'},'*');};
</script>
</body>
</html>
