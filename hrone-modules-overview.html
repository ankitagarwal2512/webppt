<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HROne — Modules Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#013a29;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Public Sans',sans-serif}
#vp{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
#stage{position:relative;width:1920px;height:1080px;background:#013a29;flex-shrink:0;transform-origin:center;overflow:hidden}
.a{position:absolute}

.nav{position:fixed;bottom:26px;right:30px;display:flex;align-items:center;gap:12px;z-index:200;background:rgba(1,58,41,.84);backdrop-filter:blur(6px);padding:8px 14px 8px 16px;border-radius:40px}
.nav-cnt{color:rgba(255,255,255,.6);font-size:14px;font-weight:500;letter-spacing:.5px;margin-right:4px}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.28);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s,transform .12s}
.nav-btn:hover{background:rgba(35,165,120,.5)}
.nav-btn:active{transform:scale(.92)}
.nav-btn svg{width:20px;height:20px}

@keyframes fi {from{opacity:0}to{opacity:1}}
@keyframes fd {from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="vp"><div id="stage">

<!-- ══ BACKGROUND ══ -->
<img class="a" src="Assets/overview bg.png" style="inset:0;width:100%;height:100%;object-fit:cover;object-position:center">

<!-- ══ HROne LOGO ══ -->
<img class="a" src="Assets/hrone-white-logo.svg"
     style="left:960px;top:560px;height:51px;width:auto;animation:fi .4s .15s ease both">

<!-- ══ TITLE ══ -->
<div class="a" style="left:960px;top:637px;width:882px;font-size:90px;font-weight:900;color:#f8d772;line-height:106px;letter-spacing:-1.5px;animation:fd .55s .2s ease both">
  The Comprehensive HCM Suite
</div>

<!-- ══ SUBTITLE ══ -->
<p class="a" style="left:962px;top:868px;width:753px;font-size:36px;font-weight:500;color:rgba(255,255,255,.7);line-height:40px;animation:fi .5s .34s ease both">
  10 Modules &nbsp;·&nbsp; 20+ marketplace integrations, 120+ Automations &amp; Workflows
</p>

<!-- ══ NAV ══ -->
<div class="nav">
  <span class="nav-cnt">20 / 30</span>
  <button class="nav-btn" id="prevBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn" id="nextBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

</div></div>
<script>
function fit(){var s=Math.min(innerWidth/1920,innerHeight/1080);document.getElementById('stage').style.transform='scale('+s+')';}
fit();addEventListener('resize',fit);
document.getElementById('prevBtn').onclick=function(){if(parent!==window)parent.postMessage({type:'nav-key',key:'ArrowLeft'},'*');};
document.getElementById('nextBtn').onclick=function(){if(parent!==window)parent.postMessage({type:'nav-key',key:'ArrowRight'},'*');};
</script>
</body>
</html>
