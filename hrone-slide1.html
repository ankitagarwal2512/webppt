<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#013A29;
  overflow:hidden;
}
#stage {
  position:absolute;
  top:0; left:0;
  width:1920px; height:1080px;
  transform-origin:0 0;
  overflow:hidden;
}
.slide {
  width:1920px; height:1080px;
  background:#013A29;
  position:relative;
  overflow:hidden;
  font-family:'Public Sans',system-ui,-apple-system,sans-serif;
  color:#fff;
}

/* ── BACKGROUND GLOWS (from Figma Ellipse 5334 + 5333) ── */
/* Full-slide divs with radial-gradient centered at Figma ellipse centers */
.glow-tl {
  position:absolute;
  inset:0;
  /* Ellipse 5334: x=52 y=-39 w=703 h=255 → center=(403,88) */
  background:radial-gradient(ellipse 620px 380px at 249px 88px,
    rgba(35,165,120,0.38) 0%,
    rgba(35,165,120,0.14) 40%,
    transparent 68%);
  pointer-events:none;
}
.glow-mr {
  position:absolute;
  inset:0;
  /* Ellipse 5333: x=1217 y=365 w=670 h=272 → center=(1552,501) */
  background:radial-gradient(ellipse 600px 360px at 1552px 501px,
    rgba(35,165,120,0.34) 0%,
    rgba(35,165,120,0.10) 40%,
    transparent 68%);
  pointer-events:none;
}

/* ── TOP BAR ── */
.topbar {
  position:absolute;
  left:0; top:0; right:0; height:86px;
  display:flex; align-items:center;
  padding:0 100px;
}
.tb-logo {
  display:flex; align-items:center;
  flex-shrink:0;
}
.tb-spacer { flex:1; }
.tb-recognized {
  text-align:right;
  font-size:14.5px; font-weight:600;
  letter-spacing:0.13em; text-transform:uppercase;
  color:#23A578;
  padding-right:40px;
  flex-shrink:0;
}
.tb-badge-group {
  display:flex; align-items:center;
  gap:0; flex-shrink:0;
}
.tb-badge {
  display:flex; align-items:center;
  gap:12px; padding:0 26px;
}
.tb-badge-logo { flex-shrink:0; }
.tb-badge-text { display:flex; flex-direction:column; gap:3px; }
.tb-badge-title {
  font-size:13px; font-weight:600;
  color:#fff; letter-spacing:0.01em; white-space:nowrap;
}
.tb-badge-sub {
  font-size:11px; font-weight:400;
  color:rgba(255,255,255,0.55); white-space:nowrap;
}
.tb-rating {
  display:flex; align-items:baseline;
  gap:1px; margin-left:8px;
}
.tb-rating-num {
  font-size:28px; font-weight:700;
  color:#fff; line-height:1;
}
.tb-rating-denom {
  font-size:14px; font-weight:400;
  color:rgba(255,255,255,0.55);
}
.tb-vdivider {
  width:1px; height:46px;
  background:rgba(255,255,255,0.14);
  flex-shrink:0;
}
.tb-extra {
  display:flex; flex-direction:column;
  align-items:flex-start; gap:2px; margin-left:14px;
}
.tb-extra-num {
  font-size:18px; font-weight:700;
  color:#fff; line-height:1;
}
.tb-extra-label {
  font-size:11px; font-weight:400;
  color:rgba(255,255,255,0.55);
}
.tb-hdivider {
  position:absolute;
  left:96px; right:96px; bottom:0;
  height:1px;
  background:rgba(255,255,255,0.10);
}

/* ── HERO ── */
.hero {
  position:absolute;
  left:0; right:0; top:180px;
  display:flex; flex-direction:column;
  align-items:center; gap:0;
  text-align:center;
}
.ai-pill {
  display:inline-flex; align-items:center;
  padding:14px 36px;
  border-radius:100px;
  position:relative;
  background:transparent;
  margin-bottom:22px;
}
.ai-pill::before {
  content:'';
  position:absolute;
  inset:0;
  border-radius:100px;
  padding:2px;
  background:linear-gradient(90deg,#FC704F,#FBBC04,#32D583,#23A578,#4ECDC4,#A78BFA,#FC704F);
  background-size:300% 100%;
  animation:gradient-border 3s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}
@keyframes gradient-border {
  0%   { background-position:0% 0%; }
  100% { background-position:300% 0%; }
}
.ai-pill-text {
  font-size:22px; font-weight:600;
  color:#fff; letter-spacing:0.02em;
  position:relative; z-index:1;
}
.hero-h1 {
  font-size:66px; font-weight:800;
  color:#fff; line-height:1.04;
  letter-spacing:-0.025em;
  margin-bottom:18px;
}
.hero-sub {
  font-size:21px; font-weight:400;
  color:rgba(255,255,255,0.55);
  letter-spacing:0.01em;
}

/* ── GREEN CUTOUT ── */
.green-cutout {
  position:absolute;
  left:-139px; bottom:0;
  width:1920px; height:176px;
  pointer-events:none;
}

/* ── WAVE ── */
.wave {
  position:absolute;
  left:0; bottom:0;
  width:1920px; height:338px;
  pointer-events:none;
}
.wave-2 {
  position:absolute;
  left:0; bottom:0;
  width:1920px; height:338px;
  pointer-events:none;
}

/* ── PRODUCT IMAGES ── */
.product-web {
  position:absolute;
  left:649px; top:428px;
  width:969px; height:830px;
  object-fit:none; object-position:top center;
  border-radius:12px 12px 0 0;
  box-shadow:
    0 -24px 80px rgba(0,18,10,0.38),
    0 24px 60px rgba(0,18,10,0.28),
    0 0 0 1px rgba(255,255,255,0.06),
    0 0 100px rgba(35,165,120,0.08);
}
.product-mobile {
  position:absolute;
  left:358px; top:517px;
  width:265px; height:638px;
  object-fit:none; object-position:top center;
  border-radius:14px;
  overflow:hidden;
  background:#013A29;
  box-shadow:
    0 12px 60px rgba(0,18,10,0.35),
    0 0 0 1px rgba(255,255,255,0.07),
    0 0 40px rgba(35,165,120,0.07);
}
.mic-badge-wrap {
  position:absolute;
  left:302px; top:656px;
  width:88px; height:85px;
}
.mic-badge {
  width:88px; height:85px;
  object-fit:contain;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,0.4));
  position:relative; z-index:1;
}
/* ── SPARK SVG ── */
.spark-svg {
  position:absolute;
  pointer-events:none;
  z-index:10;
  transform-origin:center center;
  animation:twinkle-spark 2s ease-in-out infinite;
}
@keyframes twinkle-spark {
  0%,100% { transform:scale(0) rotate(0deg);  opacity:0; }
  40%,60% { transform:scale(1) rotate(45deg); opacity:1; }
}

.ai-circle-wrap {
  position:absolute;
  left:570px; top:726px;
  width:113px; height:113px;
}
.ai-circle {
  width:78px; height:78px;
  object-fit:contain;
  filter:drop-shadow(0 4px 20px rgba(35,165,120,0.35));
  position:absolute; z-index:1;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
}
.ai-circle-wrap::before,
.ai-circle-wrap::after {
  content:'';
  position:absolute;
  top:50%; left:50%;
  width:122px; height:122px;
  margin:-61px 0 0 -61px;
  border-radius:50%;
  background:rgba(252,112,79,0.50);
  animation:ripple-solid 2.2s ease-out infinite;
  pointer-events:none;
  z-index:0;
}
.ai-circle-wrap::after { animation-delay:1.1s; }

@keyframes ripple-solid {
  0%   { transform:scale(1);   opacity:0.7; }
  50%  { opacity:0.25; }
  100% { transform:scale(2.2); opacity:0; }
}
</style>
</head>

<script>
function fit() {
  const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const x = (window.innerWidth  - 1920 * s) / 2;
  const y = (window.innerHeight - 1080 * s) / 2;
  document.getElementById('stage').style.transform = `translate(${x}px,${y}px) scale(${s})`;
}
window.addEventListener('resize', fit);
fit();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (window.parent !== window) window.parent.postMessage({type:'nav-key', key:e.key}, '*');
  }
});
</script>
