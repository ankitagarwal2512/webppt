<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World's Easiest HCM Software — HROne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  display:flex; align-items:flex-start; justify-content:flex-start;
}
#stage {
  width:1920px; height:1080px;
  transform-origin:top left;
  position:relative;
  overflow:hidden;
}
.slide {
  width:1920px; height:1080px;
  background:#0A1B10;
  position:relative;
  overflow:hidden;
  font-family:'Public Sans',system-ui,-apple-system,sans-serif;
  color:#fff;
}

/* ── BACKGROUND GLOWS ── */
.bg-blob-left {
  position:absolute;
  left:192px; top:388px;
  width:760px; height:300px;
  background:radial-gradient(ellipse at center, rgba(35,165,120,0.22) 0%, rgba(35,165,120,0.08) 45%, transparent 70%);
  pointer-events:none;
}
.bg-blob-right {
  position:absolute;
  left:1150px; top:320px;
  width:720px; height:300px;
  background:radial-gradient(ellipse at center, rgba(35,165,120,0.15) 0%, rgba(35,165,120,0.05) 50%, transparent 70%);
  pointer-events:none;
}
.bg-wave {
  position:absolute;
  left:-60px; bottom:-120px;
  width:2040px; height:380px;
  background:radial-gradient(ellipse 1200px 280px at 50% 100%, rgba(25,130,75,0.28) 0%, rgba(20,100,55,0.12) 50%, transparent 75%);
  pointer-events:none;
}
.bg-wave-2 {
  position:absolute;
  left:-200px; bottom:-80px;
  width:1200px; height:260px;
  background:radial-gradient(ellipse 800px 220px at 40% 100%, rgba(35,165,100,0.20) 0%, transparent 60%);
  pointer-events:none;
}

/* ── TOP BAR ── */
.topbar {
  position:absolute;
  left:0; top:0; right:0; height:86px;
  display:flex; align-items:center;
  padding:0 100px;
}
.tb-logo {
  display:flex; align-items:center; gap:10px;
  flex-shrink:0;
}
.tb-logo svg { width:36px; height:34px; }
.tb-logo-wordmark {
  font-size:22px; font-weight:700; letter-spacing:0.01em;
  line-height:1;
}
.tb-logo-wordmark span { font-weight:400; }
.tb-recognized {
  flex:1; text-align:center;
  font-size:10.5px; font-weight:600;
  letter-spacing:0.13em; text-transform:uppercase;
  color:rgba(255,255,255,0.45);
}
.tb-badge-group {
  display:flex; align-items:center;
  gap:0; flex-shrink:0;
}
.tb-badge {
  display:flex; align-items:center;
  gap:12px; padding:0 26px;
}
.tb-badge-logo { flex-shrink:0; }
.tb-badge-text { display:flex; flex-direction:column; gap:1px; }
.tb-badge-title {
  font-size:11px; font-weight:600;
  color:rgba(255,255,255,0.88); letter-spacing:0.02em; white-space:nowrap;
}
.tb-badge-sub {
  font-size:10px; font-weight:400;
  color:rgba(255,255,255,0.48); white-space:nowrap;
}
.tb-stars { display:flex; gap:2px; margin-bottom:2px; }
.tb-stars svg { width:9px; height:9px; }
.tb-rating {
  display:flex; align-items:baseline;
  gap:2px; margin-left:4px;
}
.tb-rating-num {
  font-size:26px; font-weight:700;
  color:#fff; line-height:1;
}
.tb-rating-denom {
  font-size:13px; font-weight:400;
  color:rgba(255,255,255,0.55);
}
.tb-vdivider {
  width:1px; height:46px;
  background:rgba(255,255,255,0.14);
  flex-shrink:0;
}
.tb-extra {
  display:flex; flex-direction:column;
  align-items:center; gap:1px; margin-left:6px;
}
.tb-extra-num {
  font-size:17px; font-weight:700;
  color:#fff; line-height:1;
}
.tb-extra-label {
  font-size:10px; font-weight:400;
  color:rgba(255,255,255,0.48);
}
.tb-hdivider {
  position:absolute;
  left:96px; right:96px; bottom:0;
  height:1px;
  background:rgba(255,255,255,0.10);
}

/* ── HERO ── */
.hero {
  position:absolute;
  left:0; right:0; top:130px;
  display:flex; flex-direction:column;
  align-items:center; gap:0;
  text-align:center;
}
.ai-pill {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 20px;
  border:1px solid rgba(35,165,120,0.55);
  border-radius:100px;
  background:rgba(35,165,120,0.09);
  margin-bottom:22px;
}
.ai-pill-icon { width:14px; height:14px; flex-shrink:0; }
.ai-pill-text {
  font-size:14px; font-weight:600;
  color:#34C98A; letter-spacing:0.04em;
}
.hero-h1 {
  font-size:66px; font-weight:800;
  color:#fff; line-height:1.04;
  letter-spacing:-0.025em;
  margin-bottom:18px;
}
.hero-sub {
  font-size:21px; font-weight:400;
  color:rgba(255,255,255,0.55);
  letter-spacing:0.01em;
}

/* ── PRODUCT IMAGES ── */
.product-web {
  position:absolute;
  left:649px; top:428px;
  width:968px; height:830px;
  object-fit:cover; object-position:top center;
  border-radius:12px 12px 0 0;
  box-shadow:
    0 -16px 60px rgba(0,0,0,0.55),
    0 0 0 1px rgba(255,255,255,0.07),
    0 0 80px rgba(35,165,120,0.06);
}
.product-mobile {
  position:absolute;
  left:358px; top:517px;
  width:265px; height:638px;
  object-fit:cover; object-position:top center;
  border-radius:14px;
  box-shadow:
    0 8px 48px rgba(0,0,0,0.50),
    0 0 0 1px rgba(255,255,255,0.06);
}
.mic-badge {
  position:absolute;
  left:292px; top:656px;
  width:88px; height:85px;
  object-fit:contain;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,0.4));
}
.ai-circle {
  position:absolute;
  left:570px; top:726px;
  width:113px; height:113px;
  object-fit:contain;
  filter:drop-shadow(0 4px 20px rgba(35,165,120,0.35));
}
</style>
</head>

  <!-- ── HERO ── -->

</div>

<script>
function resize() {
  const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const stage = document.getElementById('stage');
  stage.style.transform = `scale(${s})`;
  stage.style.marginLeft = ((window.innerWidth - 1920 * s) / 2) + 'px';
  stage.style.marginTop  = ((window.innerHeight - 1080 * s) / 2) + 'px';
}
window.addEventListener('resize', resize);
resize();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (window.parent !== window) window.parent.postMessage({type:'nav-key', key:e.key}, '*');
  }
});
</script>
</body>
</html>
