<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#1a1210;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Public Sans',sans-serif}
#viewport{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
#stage{width:1920px;height:1080px;background:#fdf5e7;position:relative;flex-shrink:0;transform-origin:center;overflow:hidden}

@keyframes fadeIn   {from{opacity:0}to{opacity:1}}
@keyframes fadeDown {from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp  {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes rowIn    {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Eyebrow ── */
.eyebrow{position:absolute;left:79px;top:73px;display:flex;align-items:center;gap:10px;
  opacity:0;animation:fadeIn .4s .1s ease forwards}
.ey-line{width:28px;height:3px;background:#ee5a3c;border-radius:2px;flex-shrink:0}
.ey-txt{font-size:14px;font-weight:700;color:#ee5a3c;letter-spacing:.16em;text-transform:uppercase}

/* ── Logo ── */
.hd-logo{position:absolute;right:80px;top:52px;opacity:0;animation:fadeIn .4s .1s ease forwards}

/* ── Headline ── */
.headline{position:absolute;left:79px;top:108px;
  font-size:90px;font-weight:800;line-height:1;letter-spacing:-2px;color:#0e0e0e;
  opacity:0;animation:fadeDown .55s .2s ease forwards}

/* ── Tagline ── */
.tagline{position:absolute;left:1089px;top:252px;width:540px;
  font-size:22px;font-weight:400;color:#3d3d3d;line-height:1.5;
  opacity:0;animation:fadeIn .5s .3s ease forwards}

/* ── Content wrap (stats + logo grid) ── */
.content-wrap{position:absolute;left:76px;top:338px;width:1769px;
  display:flex;flex-direction:column;align-items:center;gap:21px;
  opacity:0;animation:slideUp .5s .44s ease forwards}

/* Stats pill */
.stats-pill{display:flex;align-items:center;justify-content:center;gap:50px;padding:20px 30px}
.stat-col{display:flex;flex-direction:column;align-items:center;gap:5px}
.stat-num{font-size:30px;font-weight:700;color:#ee5a3c;line-height:1.2;white-space:nowrap}
.stat-lbl{font-size:16px;font-weight:500;color:#272727;white-space:nowrap}
.vdiv{width:1px;height:70px;background:#d5cfc6;flex-shrink:0}

/* Logo grid */
.logo-grid{display:flex;flex-direction:column;gap:4px;width:100%}
.logo-row{display:flex;gap:4px;opacity:0}
.logo-row:nth-child(1){animation:rowIn .35s .95s ease forwards}
.logo-row:nth-child(2){animation:rowIn .35s 1.03s ease forwards}
.logo-row:nth-child(3){animation:rowIn .35s 1.11s ease forwards}
.logo-row:nth-child(4){animation:rowIn .35s 1.19s ease forwards}
.logo-row:nth-child(5){animation:rowIn .35s 1.27s ease forwards}
.logo-row:nth-child(6){animation:rowIn .35s 1.35s ease forwards}
.logo-row:nth-child(7){animation:rowIn .35s 1.43s ease forwards}
.logo-cell{width:193px;height:70px;background:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;padding:10px 20px;overflow:hidden}
.logo-cell img{display:block;object-fit:contain;flex-shrink:0}

/* ── Nav ── */
.nav{position:fixed;bottom:26px;right:30px;display:flex;align-items:center;gap:12px;z-index:200;
  background:rgba(1,58,41,.82);backdrop-filter:blur(6px);
  padding:8px 14px 8px 16px;border-radius:40px;
  opacity:0;animation:fadeIn .6s 2.5s ease forwards}
.nav-count{color:rgba(255,255,255,.65);font-size:14px;font-weight:500;letter-spacing:.5px;margin-right:4px}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.06);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,border-color .18s,transform .12s}
.nav-btn:hover{background:rgba(35,165,120,.5);border-color:#23A578}
.nav-btn:active{transform:scale(.92)}
.nav-btn svg{width:20px;height:20px}
</style>
</head>
