<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HROne Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#013a29;font-family:'Public Sans',system-ui,sans-serif;}

  .deck{display:flex;width:100vw;height:100vh;overflow:hidden;}

  /* ── Sidebar ─────────────────────────────────── */
  .sidebar{
    width:252px;height:100vh;
    background:#0b1c12;
    display:flex;flex-direction:column;
    flex-shrink:0;overflow:hidden;
    transition:width .26s cubic-bezier(.4,0,.2,1);
    border-right:1px solid rgba(255,255,255,.06);
    z-index:10;
  }
  .sidebar.collapsed{width:56px;}

  /* Header */
  .nav-hdr{
    display:flex;align-items:center;gap:10px;
    padding:11px 10px;min-height:50px;flex-shrink:0;
    border-bottom:1px solid rgba(255,255,255,.07);
  }
  .logo-sq{
    width:28px;height:28px;border-radius:7px;background:#2563eb;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;color:#fff;flex-shrink:0;
    letter-spacing:-.5px;user-select:none;
  }
  .hdr-title{
    flex:1;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;
    overflow:hidden;transition:opacity .2s;
  }
  .sidebar.collapsed .hdr-title{opacity:0;}
  .toggle-btn{
    width:26px;height:26px;border-radius:6px;border:none;
    background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:background .15s;
  }
  .toggle-btn:hover{background:rgba(255,255,255,.15);}
  .toggle-btn svg{width:13px;height:13px;transition:transform .26s;}
  .sidebar.collapsed .toggle-btn svg{transform:scaleX(-1);}
  .sidebar.collapsed .nav-hdr{justify-content:center;}
  .sidebar.collapsed .toggle-btn{margin:0 auto;}

  /* Search */
  .nav-srch{
    padding:8px 10px;flex-shrink:0;overflow:hidden;
    border-bottom:1px solid rgba(255,255,255,.07);
    transition:max-height .26s ease,padding .26s ease,opacity .2s;
    max-height:56px;
  }
  .sidebar.collapsed .nav-srch{max-height:0;padding:0;opacity:0;pointer-events:none;}
  .srch-wrap{position:relative;}
  .srch-ico{
    position:absolute;left:9px;top:50%;transform:translateY(-50%);
    color:rgba(255,255,255,.3);pointer-events:none;display:flex;
  }
  .srch-ico svg{width:13px;height:13px;}
  .nav-srch input{
    width:100%;height:32px;border-radius:7px;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);
    color:#fff;font-family:inherit;font-size:12.5px;padding:0 8px 0 28px;
    outline:none;transition:border-color .15s,background .15s;
  }
  .nav-srch input::placeholder{color:rgba(255,255,255,.28);}
  .nav-srch input:focus{
    border-color:rgba(35,165,120,.45);
    background:rgba(35,165,120,.05);
  }

  /* Scroll */
  .nav-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:3px 0 4px;}
  .nav-scroll::-webkit-scrollbar{width:3px;}
  .nav-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
  .nav-scroll::-webkit-scrollbar-track{background:transparent;}

  /* Group */
  .nav-grp{overflow:hidden;}
  .grp-hdr{
    display:flex;align-items:center;gap:8px;
    padding:7px 10px;cursor:pointer;min-height:34px;
    transition:background .12s;user-select:none;
  }
  .grp-hdr:hover{background:rgba(255,255,255,.05);}
  .grp-ico{
    width:20px;height:20px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.45);transition:color .12s;
  }
  .grp-ico svg{width:14px;height:14px;}
  .nav-grp.open .grp-ico{color:rgba(255,255,255,.75);}
  .grp-lbl{
    flex:1;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.78);
    white-space:nowrap;overflow:hidden;
    transition:opacity .2s;
  }
  .grp-cnt{
    font-size:11px;font-weight:500;color:rgba(255,255,255,.28);
    transition:opacity .2s;flex-shrink:0;
  }
  .grp-chev{
    width:13px;height:13px;flex-shrink:0;
    color:rgba(255,255,255,.25);
    transition:transform .2s,opacity .2s;
  }
  .nav-grp.open .grp-chev{transform:rotate(90deg);}
  .sidebar.collapsed .grp-lbl,
  .sidebar.collapsed .grp-cnt,
  .sidebar.collapsed .grp-chev{opacity:0;pointer-events:none;}
  .sidebar.collapsed .grp-hdr{padding:7px 0;justify-content:center;}

  /* Slides list — animate open/close */
  .grp-slides{
    overflow:hidden;
    max-height:0;
    transition:max-height .22s ease;
  }
  .nav-grp.open .grp-slides{max-height:800px;}
  .sidebar.collapsed .grp-slides{max-height:0!important;}

  .slide-row{
    display:flex;align-items:center;gap:7px;
    padding:5px 10px 5px 36px;cursor:pointer;
    position:relative;transition:background .1s;min-height:27px;
  }
  .slide-row:hover{background:rgba(255,255,255,.04);}
  .slide-row.active{background:rgba(35,165,120,.13);}
  .slide-row.active::before{
    content:'';position:absolute;left:0;top:0;bottom:0;
    width:3px;background:#23A578;border-radius:0 2px 2px 0;
  }
  .slide-row.stub{opacity:.38;cursor:not-allowed;}
  .slide-num{
    font-size:11px;font-weight:500;color:rgba(255,255,255,.28);
    min-width:16px;text-align:right;flex-shrink:0;
  }
  .slide-row.active .slide-num{color:#23A578;}
  .slide-ttl{
    font-size:12px;font-weight:400;color:rgba(255,255,255,.68);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .slide-row.active .slide-ttl{color:#fff;font-weight:500;}

  /* Empty */
  .nav-empty{
    display:none;padding:24px 12px;text-align:center;
    font-size:12px;color:rgba(255,255,255,.22);
  }

  /* Footer */
  .nav-ftr{
    border-top:1px solid rgba(255,255,255,.07);
    padding:8px 10px;flex-shrink:0;
    display:flex;align-items:center;gap:8px;min-height:50px;
  }
  .btn-present{
    flex:1;height:32px;border-radius:7px;
    background:#23A578;border:none;color:#fff;
    font-family:inherit;font-size:12px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    gap:5px;overflow:hidden;white-space:nowrap;
    transition:background .15s;
  }
  .btn-present:hover{background:#1b9068;}
  .btn-present svg{width:11px;height:11px;flex-shrink:0;}
  .btn-lbl{transition:opacity .2s,max-width .26s;max-width:80px;overflow:hidden;}
  .sidebar.collapsed .btn-present{flex:none;width:32px;padding:0;}
  .sidebar.collapsed .btn-lbl{opacity:0;max-width:0;}
  .slide-ctr{
    font-size:11.5px;font-weight:500;color:rgba(255,255,255,.32);
    white-space:nowrap;flex-shrink:0;transition:opacity .2s;
  }
  .sidebar.collapsed .slide-ctr{opacity:0;width:0;overflow:hidden;}

  /* ── Stage ──────────────────────────────────── */
  .stage-host{
    flex:1;min-width:0;overflow:hidden;
    background:#013a29;
    display:flex;align-items:stretch;
  }
  #slideFrame{
    flex:1;border:none;width:100%;height:100%;display:block;
  }
</style>
</head>
<body>
<div class="deck">

  <!-- ══ Sidebar ══ -->
  <nav class="sidebar" id="sidebar">

    <div class="nav-hdr">
      <div class="logo-sq">H</div>
      <span class="hdr-title">HROne deck</span>
      <button class="toggle-btn" id="toggleBtn" title="Toggle sidebar">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 2L4 7l5 5"/>
        </svg>
      </button>
    </div>

    <div class="nav-srch">
      <div class="srch-wrap">
        <span class="srch-ico">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <circle cx="6" cy="6" r="4"/><path d="M10 10l2.5 2.5"/>
          </svg>
        </span>
        <input type="text" id="searchInput" placeholder="Jump to slide…" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="nav-scroll" id="navScroll">
      <div class="nav-empty" id="navEmpty">No slides match</div>
    </div>

    <div class="nav-ftr">
      <button class="btn-present" id="presentBtn" title="Present fullscreen">
        <svg viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>
        <span class="btn-lbl">Present</span>
      </button>
      <span class="slide-ctr" id="slideCtr">5 / 32</span>
    </div>

  </nav>

  <!-- ══ Stage ══ -->
  <div class="stage-host">
    <iframe id="slideFrame" src="hrone-slide5.html" allowfullscreen title="Slide stage"></iframe>
  </div>

</div>
<script>
// ── Manifest ────────────────────────────────────────────────────
const GROUPS = [
  { id:'intro', label:'Introduction', icon:'M2 3h10M2 6.5h8M2 10h5.5',
    slides:[
      { n:1,  t:'Welcome to HROne',           f:null },
      { n:2,  t:'The Problem We Solve',        f:null },
      { n:3,  t:'Why HROne',                   f:null },
      { n:4,  t:'By the Numbers',              f:null },
    ]},
  { id:'platform', label:'The Platform', icon:'M2 2h4v4H2zM8 2h4v4H8zM2 8h4v4H2zM8 8h4v4H8z',
    slides:[
      { n:5,  t:'The Comprehensive HCM Suite', f:'hrone-slide5.html' },
      { n:6,  t:'Payroll Outsourcing',          f:'hrone-slide6.html' },
      { n:7,  t:'Platform Architecture',        f:null },
    ]},
  { id:'mobile', label:'Mobile & AI', icon:'M4 1h6a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1zM6 11.5h2',
    slides:[
      { n:8,  t:'Mobile-First Experience',     f:null },
      { n:9,  t:'OneAI Voice Agent',           f:null },
      { n:10, t:'AI-Powered Insights',         f:null },
    ]},
  { id:'build', label:'Build & Extend', icon:'M4 3L2 7l2 4M10 3l2 4-2 4',
    slides:[
      { n:11, t:'HROne Studio',                f:null },
      { n:12, t:'Custom Apps & Workflows',     f:null },
      { n:13, t:'Reporting & Analytics',       f:null },
      { n:14, t:'Role-Based Access Control',   f:null },
    ]},
  { id:'analytics', label:'Analytics & Trust', icon:'M2 10l3-4 3 2 4-5',
    slides:[
      { n:15, t:'Compliance Dashboard',        f:null },
      { n:16, t:'Audit & Security',            f:null },
      { n:17, t:'Data Residency',              f:null },
      { n:18, t:'Enterprise Trust',            f:null },
    ]},
  { id:'modules', label:'Modules', icon:'M2 2h10v2H2zM2 6h10v2H2zM2 10h10v2H2z',
    slides:[
      { n:19, t:'Core HR',                     f:null },
      { n:20, t:'Recruitment',                 f:null },
      { n:21, t:'Onboarding',                  f:null },
      { n:22, t:'Workforce Management',        f:null },
      { n:23, t:'Time Office',                 f:null },
      { n:24, t:'Payroll',                     f:null },
      { n:25, t:'Performance',                 f:null },
      { n:26, t:'Engagement',                  f:null },
      { n:27, t:'Expense',                     f:null },
      { n:28, t:'Helpdesk',                    f:null },
    ]},
  { id:'market', label:'Marketplace', icon:'M2 5h10l-1 7H3L2 5zM5 5V4a2 2 0 014 0v1',
    slides:[
      { n:29, t:'Add-Ons Overview',            f:null },
      { n:30, t:'Integrations Ecosystem',      f:null },
      { n:31, t:'API Marketplace',             f:null },
    ]},
  { id:'close', label:'Close', icon:'M2 7l3.5 3.5 6.5-6.5',
    slides:[
      { n:32, t:'Next Steps & Demo',           f:null },
    ]},
];

// Flat map: filename → slide object
const FILE_MAP = {};
GROUPS.forEach(g => g.slides.forEach(s => { if (s.f) FILE_MAP[s.f] = s; }));

// ── Build DOM ────────────────────────────────────────────────────
const navScroll = document.getElementById('navScroll');
const navEmpty  = document.getElementById('navEmpty');

GROUPS.forEach(g => {
  const grpEl = document.createElement('div');
  grpEl.className = 'nav-grp';
  grpEl.dataset.gid = g.id;

  grpEl.innerHTML =
    `<div class="grp-hdr">
       <div class="grp-ico">
         <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
           <path d="${g.icon}"/>
         </svg>
       </div>
       <span class="grp-lbl">${g.label}</span>
       <span class="grp-cnt">${g.slides.length}</span>
       <svg class="grp-chev" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
         <path d="M5 3l4 4-4 4"/>
       </svg>
     </div>
     <div class="grp-slides">
       ${g.slides.map(s =>
         `<div class="slide-row${s.f ? '' : ' stub'}"
               data-n="${s.n}"
               data-q="${s.t.toLowerCase()}"
               data-file="${s.f || ''}">
            <span class="slide-num">${s.n}</span>
            <span class="slide-ttl">${s.t}</span>
          </div>`
       ).join('')}
     </div>`;

  // Toggle accordion
  grpEl.querySelector('.grp-hdr').addEventListener('click', () => {
    if (!sidebar.classList.contains('collapsed')) {
      grpEl.classList.toggle('open');
    }
  });

  // Slide click
  grpEl.querySelectorAll('.slide-row:not(.stub)').forEach(row => {
    row.addEventListener('click', () => goTo(parseInt(row.dataset.n), row.dataset.file));
  });

  navScroll.insertBefore(grpEl, navEmpty);
});

// ── State ────────────────────────────────────────────────────────
const sidebar    = document.getElementById('sidebar');
const frame      = document.getElementById('slideFrame');
const slideCtr   = document.getElementById('slideCtr');
let   current    = 5;

function setActive(n) {
  current = n;
  slideCtr.textContent = `${n} / 32`;

  document.querySelectorAll('.slide-row').forEach(r => {
    r.classList.toggle('active', parseInt(r.dataset.n) === n);
  });

  // Auto-open parent group, close others
  document.querySelectorAll('.nav-grp').forEach(g => {
    const hasIt = [...g.querySelectorAll('.slide-row')].some(r => parseInt(r.dataset.n) === n);
    if (hasIt) g.classList.add('open');
  });

  // Scroll active into view
  requestAnimationFrame(() => {
    const activeRow = navScroll.querySelector('.slide-row.active');
    if (activeRow) activeRow.scrollIntoView({ block:'nearest', behavior:'smooth' });
  });
}

function goTo(n, file) {
  if (!file) return;
  frame.src = file;
  setActive(n);
}

// Sync sidebar when slide's own prev/next arrows are used
frame.addEventListener('load', () => {
  try {
    const href = frame.contentWindow.location.href;
    const file = href.split('/').pop().split('?')[0];
    const match = FILE_MAP[file];
    if (match) setActive(match.n);
  } catch(e) {}
  // Kick the slide's fit() so it rescales to iframe size
  try { frame.contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
});

// Init
setActive(5);

// ── Collapse / Expand ─────────────────────────────────────────────
const toggleBtn = document.getElementById('toggleBtn');
toggleBtn.addEventListener('click', () => {
  sidebar.classList.toggle('collapsed');
  afterTransition();
});

function afterTransition() {
  setTimeout(() => {
    try { frame.contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
  }, 280);
}

// ── Search ────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  let anyVisible = false;

  document.querySelectorAll('.nav-grp').forEach(g => {
    let grpMatch = false;
    g.querySelectorAll('.slide-row').forEach(r => {
      const show = !q || r.dataset.q.includes(q) || r.dataset.n.includes(q);
      r.style.display = show ? '' : 'none';
      if (show) grpMatch = true;
    });
    g.style.display = grpMatch ? '' : 'none';
    if (q && grpMatch) g.classList.add('open');
    if (grpMatch) anyVisible = true;
  });

  navEmpty.style.display = (!anyVisible && q) ? 'block' : 'none';
});

// ── Present (fullscreen) ──────────────────────────────────────────
let wasCollapsed = false;
document.getElementById('presentBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    wasCollapsed = sidebar.classList.contains('collapsed');
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
});

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    sidebar.classList.add('collapsed');
    afterTransition();
  } else {
    if (!wasCollapsed) sidebar.classList.remove('collapsed');
    afterTransition();
  }
});

// ── Keyboard nav (deck-level) ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const built = GROUPS.flatMap(g => g.slides.filter(s => s.f)).sort((a,b) => a.n - b.n);
  const idx   = built.findIndex(s => s.n === current);
  if (e.key === 'ArrowRight' && idx < built.length - 1) goTo(built[idx+1].n, built[idx+1].f);
  if (e.key === 'ArrowLeft'  && idx > 0)                goTo(built[idx-1].n, built[idx-1].f);
});
</script>
</body>
</html>
